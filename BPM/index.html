<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPM测量器</title>
    <style>
        #bpmDisplay {
            font-size: 24px;
            margin-top: 20px;
        }
        #bpmList {
            list-style-type: none;
            padding: 0;
        }
        #bpmList li {
            margin-bottom: 5px;
        }
        .imgTitle {
            display: flex;
            justify-content: center;
            height: 50;
        }
    </style>
</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <div class="imgTitle">
        <a href="../">
            <img src="../tlPicture.png" height="50" width="50">
        </a>
    </div>
    <h1 style="text-align: center;">BPM 测量器</h1>
    <div style="text-align: center;">
        <button id="clickButton">点击我</button>
        <button id="resetButton">重置</button>
    </div>
    <div id="bpmDisplay" style="text-align: center;">点击或键盘敲击以测量 BPM</div>
    <canvas id="bpmChart" width="2" height="1"></canvas>
    <script src="bpm.js"></script>
</body>

</html>
