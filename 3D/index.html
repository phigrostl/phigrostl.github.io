<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js 鼠标控制相机</title>
    <style>
        body { margin: 0; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="module">
        import * as THREE from '../three.js-master/src/Three.js';
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1, 5);

        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geometry = new THREE.BoxGeometry();
        const material = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);

        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 5, 5).normalize();
        scene.add(directionalLight);

        let mouseX = 0, mouseY = 0;
        const smoothFactor = 0.1;

        // 相机目标旋转的四元数
        const targetQuaternion = new THREE.Quaternion();
        const currentQuaternion = new THREE.Quaternion();

        function onMouseMove(event) {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = - (event.clientY / window.innerHeight) * 2 + 1;

            // 根据鼠标位置计算相机目标旋转
            const spherical = new THREE.Spherical();
            spherical.phi = (mouseY * Math.PI * 0.5) + (Math.PI * 0.5);
            spherical.theta = mouseX * Math.PI * 2;

            // 目标四元数
            targetQuaternion.setFromEuler(new THREE.Euler(spherical.phi, spherical.theta, 0, 'YXZ'));
        }

        window.addEventListener('mousemove', onMouseMove);

        function animate() {
            requestAnimationFrame(animate);

            // 使用四元数进行平滑过渡
            currentQuaternion.slerp(targetQuaternion, smoothFactor);
            camera.rotation.setFromQuaternion(currentQuaternion);

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
